<!doctype html>
<meta charset="utf-8">
<title>Lifestyle Dashboard</title>
<meta name="viewport" content="width=device-width,initial-scale=1">
<style>
  :root {
    --paper: #f4ecdd;
    --paper-deep: #e6d8bc;
    --ink: #17130f;
    --muted: #6f665d;
    --line: rgba(23, 19, 15, 0.12);
    --panel: rgba(255,255,255,0.76);
    --accent: #c44e2b;
    --accent-soft: rgba(196,78,43,0.12);
    --shadow: 0 18px 42px rgba(74, 56, 37, 0.12);
    --display: Georgia, "Times New Roman", serif;
    --body: "Avenir Next", "Segoe UI", sans-serif;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    color: var(--ink);
    font-family: var(--body);
    background:
      radial-gradient(circle at top left, rgba(196,78,43,0.14), transparent 24%),
      radial-gradient(circle at 85% 10%, rgba(88,102,71,0.12), transparent 22%),
      linear-gradient(180deg, #f7f0e2 0%, var(--paper) 54%, var(--paper-deep) 100%);
  }
  a { color: inherit; text-decoration: none; }
  .page {
    width: min(1420px, calc(100% - 28px));
    margin: 0 auto;
    padding: 22px 0 40px;
  }
  .hero {
    padding: 26px;
    border-radius: 28px;
    background: linear-gradient(135deg, rgba(28,22,17,0.98), rgba(82,44,27,0.94) 48%, rgba(125,57,32,0.9) 100%);
    color: #fff9f2;
    box-shadow: var(--shadow);
  }
  .eyebrow {
    display: inline-flex;
    padding: 8px 12px;
    border-radius: 999px;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    font-size: 12px;
    background: rgba(255,255,255,0.1);
    border: 1px solid rgba(255,255,255,0.12);
  }
  .hero-grid {
    display: block;
    margin-top: 18px;
  }
  .hero h1 {
    margin: 14px 0 0;
    font: 700 clamp(40px, 6vw, 70px)/0.94 var(--display);
    letter-spacing: -0.05em;
  }
  .metrics {
    display: grid;
    grid-template-columns: repeat(3, minmax(0, 1fr));
    gap: 12px;
    margin-top: 20px;
  }
  .metric {
    padding: 16px;
    border-radius: 18px;
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.12);
  }
  .metric-label {
    display: block;
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: rgba(255,249,242,0.72);
  }
  .metric-value {
    display: block;
    margin-top: 6px;
    font-size: clamp(24px, 3vw, 34px);
    font-weight: 700;
  }
  .controls {
    margin-top: 18px;
    padding: 18px;
    border-radius: 28px;
    background: rgba(255,255,255,0.58);
    border: 1px solid rgba(255,255,255,0.6);
    box-shadow: 0 10px 28px rgba(86, 63, 42, 0.08);
  }
  .toolbar {
    display: grid;
    grid-template-columns: 1.5fr repeat(3, minmax(160px, 1fr)) auto;
    gap: 12px;
    align-items: end;
  }
  .field {
    display: grid;
    gap: 6px;
  }
  .field span {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--muted);
  }
  input, select, button {
    width: 100%;
    padding: 13px 14px;
    border-radius: 14px;
    border: 1px solid var(--line);
    background: rgba(255,255,255,0.82);
    color: var(--ink);
    font: inherit;
  }
  button {
    width: auto;
    background: var(--accent);
    color: white;
    border-color: transparent;
    font-weight: 700;
    cursor: pointer;
  }
  .summary {
    display: grid;
    grid-template-columns: repeat(4, minmax(0, 1fr));
    gap: 12px;
    margin-top: 16px;
  }
  .summary-card {
    padding: 16px 18px;
    border-radius: 18px;
    background: var(--panel);
    border: 1px solid rgba(255,255,255,0.66);
    box-shadow: 0 10px 24px rgba(82, 62, 42, 0.08);
  }
  .summary-card strong {
    display: block;
    margin-bottom: 6px;
    font-size: 13px;
    color: var(--muted);
  }
  .summary-card span {
    display: block;
    font-size: 24px;
    font-weight: 700;
  }
  .grid {
    display: grid;
    grid-template-columns: repeat(3, minmax(0, 1fr));
    gap: 18px;
    margin-top: 20px;
  }
  .panel {
    display: grid;
    gap: 12px;
    padding: 18px;
    border-radius: 22px;
    background: var(--panel);
    border: 1px solid rgba(255,255,255,0.66);
    box-shadow: 0 14px 34px rgba(82, 62, 42, 0.1);
  }
  .panel-head {
    display: flex;
    justify-content: space-between;
    gap: 10px;
    align-items: flex-start;
  }
  .panel h2 {
    margin: 0;
    font: 700 24px/1.08 var(--display);
    letter-spacing: -0.03em;
  }
  .badge {
    display: inline-flex;
    align-items: center;
    padding: 6px 10px;
    border-radius: 999px;
    background: var(--accent-soft);
    color: var(--accent);
    font-size: 12px;
    font-weight: 700;
  }
  .meta {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    font-size: 12px;
    color: var(--muted);
  }
  .top-story {
    display: none;
  }
  .story-list {
    margin: 0;
    padding-left: 20px;
    display: grid;
    gap: 10px;
  }
  .story-list li {
    line-height: 1.45;
    color: var(--muted);
  }
  .story-list a {
    color: var(--ink);
  }
  .empty {
    grid-column: 1 / -1;
    padding: 34px 22px;
    border-radius: 22px;
    background: rgba(255,255,255,0.72);
    border: 1px dashed rgba(23,19,15,0.18);
    text-align: center;
    color: var(--muted);
  }
  .footer {
    margin-top: 18px;
    text-align: center;
    color: var(--muted);
    font-size: 13px;
  }
  @media (max-width: 1180px) {
    .toolbar { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    .grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
  }
  @media (max-width: 920px) {
    .metrics,
    .summary,
    .grid { grid-template-columns: 1fr; }
  }
  @media (max-width: 640px) {
    .page { width: min(100% - 18px, 1420px); }
    .hero, .controls { padding: 18px; }
    .toolbar { grid-template-columns: 1fr; }
    button { width: 100%; }
  }
</style>
<div class="page">
  <section class="hero">
    <div class="eyebrow">Lifestyle Dashboard</div>
    <div class="hero-grid">
      <h1>Lifestyle Dashboard</h1>
    </div>
    <div class="metrics">
      <div class="metric">
        <span class="metric-label">Tracked Sources</span>
        <span class="metric-value" id="metricSources">0</span>
      </div>
      <div class="metric">
        <span class="metric-label">Stories In Snapshot</span>
        <span class="metric-value" id="metricStories">0</span>
      </div>
      <div class="metric">
        <span class="metric-label">Last Refresh</span>
        <span class="metric-value" id="metricRefresh">-</span>
      </div>
    </div>
  </section>

  <section class="controls">
    <div class="toolbar">
      <label class="field">
        <span>Search</span>
        <input id="search" placeholder="Search topics, people, headlines...">
      </label>
      <label class="field">
        <span>Category</span>
        <select id="categorySelect"></select>
      </label>
      <label class="field">
        <span>Source</span>
        <select id="sourceSelect"></select>
      </label>
      <label class="field">
        <span>Sort</span>
        <select id="sort">
          <option value="rankAsc">Rank: low to high</option>
          <option value="rankDesc">Rank: high to low</option>
          <option value="alpha">Headline: A to Z</option>
        </select>
      </label>
      <button id="reload" type="button">Reset</button>
    </div>
    <div class="summary">
      <div class="summary-card">
        <strong>Visible Panels</strong>
        <span id="visibleCount">0</span>
      </div>
      <div class="summary-card">
        <strong>Category</strong>
        <span id="activeCategory">All</span>
      </div>
      <div class="summary-card">
        <strong>Source focus</strong>
        <span id="topRank">-</span>
      </div>
      <div class="summary-card">
        <strong>Search state</strong>
        <span id="searchState">Everything</span>
      </div>
    </div>
  </section>

  <main class="grid" id="grid"></main>
</div>

const ENRICHED = RAW.map(row => ({
  ...row,
  category: row.category || inferCategory(row.source)
}));
const SOURCES = [...new Set(ENRICHED.map(d => d.source))];
const CATEGORIES = [...new Set(ENRICHED.map(d => d.category))];
const state = { raw: ENRICHED, filterText: "", sortMode: "rankAsc", source: "All", category: "All" };

function asc(a, b) {
  return a < b ? -1 : a > b ? 1 : 0;
}

function inferCategory(source) {
  const text = (source || "").toLowerCase();
  if (text.includes("people")) return "people";
  if (text.includes("science")) return "science";
  if (text.includes("worklife")) return "worklife";
  if (text.includes("health") || text.includes("nutrition") || text.includes("fitness")) return "health";
  return "lifestyle";
}

function formatStamp(value) {
  if (!value) return "-";
  const dt = new Date(value);
  if (Number.isNaN(dt.getTime())) return value;
  return dt.toLocaleString("en-IN", {
    day: "2-digit",
    month: "short",
    hour: "2-digit",
    minute: "2-digit"
  });
}

function applyFilters(rows) {
  let result = rows.slice();
  if (state.category !== "All") {
    result = result.filter(d => d.category === state.category);
  }
  if (state.source !== "All") {
    result = result.filter(d => d.source === state.source);
  }
  if (state.filterText) {
    const q = state.filterText.toLowerCase();
    result = result.filter(d => (d.headline || "").toLowerCase().includes(q));
  }
  switch (state.sortMode) {
    case "rankAsc": result.sort((a, b) => a.rank - b.rank); break;
    case "rankDesc": result.sort((a, b) => b.rank - a.rank); break;
    case "alpha": result.sort((a, b) => asc(a.headline, b.headline)); break;
  }
  return result;
}

function bySource(rows) {
  return SOURCES.map(source => ({
    source,
    rows: rows.filter(row => row.source === source)
  })).filter(group => group.rows.length);
}

function panelTemplate(group) {
  const top = group.rows[0];
  const items = group.rows.map(row => `
    <li><a href="${row.link}" target="_blank" rel="noopener">#${row.rank} ${row.headline}</a></li>
  `).join("");
  return `
    <section class="panel">
      <div class="panel-head">
        <div>
          <span class="badge">${group.rows[0].category}</span>
          <h2><a href="${top.source_url || '#'}" target="_blank" rel="noopener">${group.source}</a></h2>
        </div>
        <div class="meta">
          <span>${group.rows.length} stories</span>
          <span>${formatStamp(top.collected_at_iso)}</span>
        </div>
      </div>
      <ol class="story-list">${items}</ol>
    </section>
  `;
}

function renderPanels(rows) {
  const root = document.querySelector("#grid");
  const groups = bySource(rows);
  if (!groups.length) {
    root.innerHTML = `<div class="empty">No sources match this filter yet. Try another category or clear the search.</div>`;
    return;
  }
  root.innerHTML = groups.map(panelTemplate).join("");
}

function renderSummary(rows) {
  const groups = bySource(rows);
  document.querySelector("#visibleCount").textContent = String(groups.length);
  document.querySelector("#activeCategory").textContent = state.category;
  document.querySelector("#topRank").textContent = state.source;
  document.querySelector("#searchState").textContent = state.filterText ? `“${state.filterText}”` : "Everything";
}

function renderHeroMetrics() {
  document.querySelector("#metricSources").textContent = String(SOURCES.length);
  document.querySelector("#metricStories").textContent = String(ENRICHED.length);
  const latest = ENRICHED.reduce((acc, row) => {
    const stamp = row.collected_at_iso || "";
    return stamp > acc ? stamp : acc;
  }, "");
  document.querySelector("#metricRefresh").textContent = formatStamp(latest);
}

function fillSourceSelect() {
  document.querySelector("#sourceSelect").innerHTML =
    ["All", ...SOURCES].map(source => `<option value="${source}">${source}</option>`).join("");
}

function fillCategorySelect() {
  document.querySelector("#categorySelect").innerHTML =
    ["All", ...CATEGORIES].map(category => `<option value="${category}">${category}</option>`).join("");
}

function render() {
  const rows = applyFilters(state.raw);
  renderPanels(rows);
  renderSummary(rows);
}

document.querySelector("#search").addEventListener("input", ev => {
  state.filterText = ev.target.value || "";
  render();
});
document.querySelector("#categorySelect").addEventListener("change", ev => {
  state.category = ev.target.value;
  render();
});
document.querySelector("#sourceSelect").addEventListener("change", ev => {
  state.source = ev.target.value;
  render();
});
document.querySelector("#sort").addEventListener("change", ev => {
  state.sortMode = ev.target.value;
  render();
});
document.querySelector("#reload").addEventListener("click", () => {
  state.filterText = "";
  state.sortMode = "rankAsc";
  state.category = "All";
  state.source = "All";
  document.querySelector("#search").value = "";
  document.querySelector("#categorySelect").value = "All";
  document.querySelector("#sourceSelect").value = "All";
  document.querySelector("#sort").value = "rankAsc";
  render();
});

fillCategorySelect();
fillSourceSelect();
renderHeroMetrics();
render();
</script>
